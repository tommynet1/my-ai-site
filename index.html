<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智匯諮詢 | 您的企業數位轉型夥伴</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 導覽列 ---
        const Navbar = ({ currentPage, setCurrentPage }) => {
            const [isOpen, setIsOpen] = useState(false);
            const menuItems = [
                { id: 'home', name: '首頁' },
                { id: 'about', name: '關於我們' },
                { id: 'services', name: '服務項目' },
                { id: 'contact', name: '聯絡我們' }
            ];

            return (
                <nav className="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
                    <div className="container mx-auto px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentPage('home')}>
                            <div className="w-8 h-8 bg-brand-600 rounded-lg shadow-inner"></div>
                            <span className="text-xl font-bold text-brand-900">智匯諮詢</span>
                        </div>
                        <div className="hidden md:flex gap-8">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => setCurrentPage(item.id)}
                                    className={`font-medium transition-colors hover:text-brand-600 ${currentPage === item.id ? 'text-brand-600' : 'text-gray-600'}`}>
                                    {item.name}
                                </button>
                            ))}
                        </div>
                        <button className="md:hidden" onClick={() => setIsOpen(!isOpen)}>
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                        </button>
                    </div>
                    {isOpen && (
                        <div className="md:hidden bg-white border-t py-4 px-6 flex flex-col gap-4 animate-fadeIn">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => {setCurrentPage(item.id); setIsOpen(false);}} className="text-left py-2 border-b border-gray-50">{item.name}</button>
                            ))}
                        </div>
                    )}
                </nav>
            );
        };

        // --- 首頁 ---
        const HomePage = ({ onNavigate }) => (
            <div className="pt-20 animate-fadeIn">
                <section className="container mx-auto px-6 py-20 flex flex-col md:flex-row items-center gap-12">
                    <div className="md:w-1/2 space-y-6">
                        <h1 className="text-5xl font-extrabold text-gray-900 leading-tight">用 AI 驅動您的 <br/><span className="text-brand-600">企業未來</span></h1>
                        <p className="text-xl text-gray-600 leading-relaxed">我們提供專業的數位轉型諮詢，協助中小企業在變革中穩定成長。讓科技成為您最堅強的後盾。</p>
                        <button onClick={() => onNavigate('contact')} className="bg-brand-600 text-white px-8 py-3 rounded-full font-bold hover:bg-brand-700 transition-all shadow-lg shadow-brand-200">立即預約諮詢</button>
                    </div>
                    <div className="md:w-1/2">
                        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80" className="rounded-3xl shadow-2xl" alt="Business Transformation" />
                    </div>
                </section>
            </div>
        );

        // --- 關於我們 ---
        const AboutPage = () => (
            <div className="pt-32 pb-20 container mx-auto px-6 animate-fadeIn">
                <div className="flex flex-col md:flex-row items-center gap-16 mb-20">
                    <div className="md:w-1/2">
                        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=800&q=80" className="rounded-3xl shadow-xl" alt="Team Work" />
                    </div>
                    <div className="md:w-1/2 space-y-6">
                        <h2 className="text-3xl font-bold text-gray-900">關於智匯諮詢</h2>
                        <p className="text-gray-600 text-lg leading-relaxed">智匯諮詢成立於 2020 年，總部位於台灣台中。我們是一群熱愛科技與經營管理的顧問團隊，致力於將複雜的 AI 技術轉化為企業能實際應用的解決方案。</p>
                        <div className="grid grid-cols-2 gap-6 pt-4">
                            <div className="p-4 bg-white rounded-xl shadow-sm border-l-4 border-brand-600">
                                <h4 className="font-bold text-2xl text-brand-600">500+</h4>
                                <p className="text-gray-500 text-sm">協助企業轉型</p>
                            </div>
                            <div className="p-4 bg-white rounded-xl shadow-sm border-l-4 border-brand-600">
                                <h4 className="font-bold text-2xl text-brand-600">98%</h4>
                                <p className="text-gray-500 text-sm">客戶滿意度</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- 服務項目 (已修復圖片連結) ---
        const ServicesPage = () => (
            <div className="pt-32 pb-20 container mx-auto px-6 animate-fadeIn">
                <h2 className="text-3xl font-bold text-center mb-16">我們的專業服務</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                    {[
                        { title: '數位轉型諮詢', desc: '深入診斷企業現有流程，量身打造自動化轉型藍圖。', img: 'https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80' },
                        { title: '品牌視覺重塑', desc: '結合市場數據與設計美學，為企業建立獨一無二的品牌認知度。', img: 'https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=800&q=80' },
                        { title: '企業 AI 工作坊', desc: '手把手教導員工如何使用 AI 工具，將生產力提升至全新層次。', img: 'https://images.unsplash.com/photo-1591453089816-0fbb971b454c?auto=format&fit=crop&w=800&q=80' }
                    ].map((s, i) => (
                        <div key={i} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all">
                            <img src={s.img} className="w-full h-48 object-cover" alt={s.title} />
                            <div className="p-8">
                                <h3 className="text-xl font-bold mb-4">{s.title}</h3>
                                <p className="text-gray-600 leading-relaxed">{s.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 聯絡我們 (已串接真實收信功能) ---
        const ContactPage = () => {
            const [status, setStatus] = useState(""); 
            
            // --- 教學重點：讓學生填入自己的 ID ---
            const FORMSPREE_ID = "xlgokgna"; // 這裡換成學生自己的 Formspree ID

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus("sending");
                const form = e.target;
                const data = new FormData(form);
                
                const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    setStatus("success");
                    form.reset();
                } else {
                    setStatus("error");
                }
            };

            return (
                <div className="pt-32 pb-20 container mx-auto px-6 max-w-2xl animate-fadeIn">
                    <div className="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-gray-100">
                        <h2 className="text-3xl font-bold mb-4">預約免費諮詢</h2>
                        <p className="text-gray-500 mb-8 font-medium">填寫下方表單，我們會將您的需求寄送到指定信箱。</p>
                        
                        <form className="space-y-6" onSubmit={handleSubmit}>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">您的姓名</label>
                                    <input name="name" type="text" required placeholder="例如：顏先生" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-600 transition-all" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">聯絡信箱</label>
                                    <input name="email" type="email" required placeholder="service@gmail.com" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-600 transition-all" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">需求描述</label>
                                <textarea name="message" rows="4" placeholder="請填寫您的需求..." className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-600 transition-all"></textarea>
                            </div>
                            
                            <button type="submit" disabled={status === "sending"} className={`w-full py-4 rounded-xl font-bold text-white transition-all shadow-lg ${status === "success" ? 'bg-green-500' : 'bg-brand-600 hover:bg-brand-700'}`}>
                                {status === "sending" ? "傳送中..." : status === "success" ? "✅ 發送成功！請檢查信箱" : "立即送出需求單"}
                            </button>
                            {status === "error" && <p className="text-center text-red-500 text-sm mt-4">發送出錯，請檢查 Formspree ID 是否正確。</p>}
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

            return (
                <div className="min-h-screen flex flex-col font-sans overflow-x-hidden">
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main className="flex-grow">
                        {currentPage === 'home' && <HomePage onNavigate={setCurrentPage} />}
                        {currentPage === 'about' && <AboutPage />}
                        {currentPage === 'services' && <ServicesPage />}
                        {currentPage === 'contact' && <ContactPage />}
                    </main>
                    <footer className="bg-gray-900 text-gray-500 py-12 text-center text-sm">
                        <div className="mb-4 text-gray-300 font-bold text-lg">智匯諮詢有限公司</div>
                        <p className="mb-2">地址：台中市豐原區某某路 88 號</p>
                        <p>&copy; 2026 AI Web Academy Tutorial. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
